<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure User Management</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 10px; }
    h1 { margin-bottom: 0.2rem; }
    h2 { margin-top: 2rem; }
    form { margin-bottom: 1rem; }
    label { display: block; margin-top: 0.5rem; }
    input, select { padding: 0.4rem; width: 100%; max-width: 320px; }
    button { margin-top: 0.8rem; padding: 0.4rem 0.8rem; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 0.4rem 0.6rem; text-align: left; }
    th { background: #f5f5f5; }
    .message { margin-top: 0.6rem; }
    .message.error { color: #c00; }
    .message.success { color: #090; }
    .small { font-size: 0.85rem; color: #666; }
  </style>
</head>
<body>
  <h1>User Management</h1>
  <p class="small">Demo app using PHP + Docker MySQL with safer defaults.</p>

  <h2>Create User</h2>
  <form id="userForm" autocomplete="off" novalidate>
    <label>
      Username:
      <input type="text" id="username" required minlength="3" maxlength="32" pattern="[A-Za-z0-9_]+">
    </label>
    <label>
      Email:
      <input type="email" id="email" required maxlength="100">
    </label>
    <label>
      Role:
      <select id="role">
        <option value="admin">admin</option>
        <option value="editor">editor</option>
        <option value="user" selected>user</option>
      </select>
    </label>
    <button type="submit">Create User</button>
  </form>

  <div id="message" class="message"></div>

  <h2>User List</h2>
  <button id="refreshBtn" type="button">Refresh List</button>

  <table aria-label="User list">
    <thead>
      <tr>
        <th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Created</th>
      </tr>
    </thead>
    <tbody id="userTableBody">
      <tr><td colspan="5">Loading...</td></tr>
    </tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
